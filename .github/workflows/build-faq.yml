name: Build FAQ

on:
  push:
    branches:
      - main
    paths:
      - 'faq/questions/**'
      - 'build-faq.js'
      - 'package.json'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build FAQ
        run: |
          echo "Generating faq/index.html..."
          node build-faq.js
          echo "✅ Done"
          ls -lah faq/index.html
      
      - name: Commit via GitHub API
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const filePath = 'faq/index.html';
            const content = fs.readFileSync(filePath, 'utf-8');
            const base64Content = Buffer.from(content).toString('base64');
            
            try {
              // Hole aktuelle commit SHA
              const ref = await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'heads/main'
              });
              
              const currentCommitSha = ref.data.object.sha;
              
              // Hole current tree
              const commit = await github.rest.git.getCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: currentCommitSha
              });
              
              // Create new blob (file content)
              const blob = await github.rest.git.createBlob({
                owner: context.repo.owner,
                repo: context.repo.repo,
                content: base64Content,
                encoding: 'base64'
              });
              
              // Create new tree with updated file
              const tree = await github.rest.git.createTree({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base_tree: commit.data.tree.sha,
                tree: [{
                  path: filePath,
                  mode: '100644',
                  type: 'blob',
                  sha: blob.data.sha
                }]
              });
              
              // Create new commit
              const newCommit = await github.rest.git.createCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                message: 'build(faq): auto-generated from markdown',
                tree: tree.data.sha,
                parents: [currentCommitSha]
              });
              
              // Update main branch to new commit
              await github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'heads/main',
                sha: newCommit.data.sha
              });
              
              console.log('✅ Commit created via API');
            } catch (error) {
              console.log('No changes or error: ' + error.message);
            }
