name: Create Support Issue from Form

on:
  repository_dispatch:
    types: [support-form-submitted]

jobs:
  create-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Create Issue in customer Repo
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SUPPORT_TOKEN }}
          script: |\
            const payload = context.payload.client_payload;
            
            const categoryLabel = {
              'installation': 'cat/installation',
              'billing': 'cat/billing',
              'account': 'cat/account',
              'technical': 'cat/technical',
              'other': 'cat/other'
            }[payload.kategorie] || 'cat/other';

            const telefonText = payload.telefon ? `**Telefon:** ${payload.telefon}\n\n` : '';

            const issue = await github.rest.issues.create({
              owner: 'WEBGUARDS-DE',
              repo: 'customer',
              title: '[Support] ' + payload.name,
              body: `**Von:** ${payload.name} (${payload.email})\n${telefonText}---\n\n## Nachricht\n\n${payload.nachricht}\n\n---\n\n_Erstellt automatisch via Formular auf help.webguards.de_`,
              labels: ['status/new', 'type/support', categoryLabel]
            });

            console.log('Issue #' + issue.data.number + ' im customer-Repo erstellt');
