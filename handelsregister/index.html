<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handelsregisterauszug - WEBGUARDS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-light: #3b82f6;
            --bg: #0d2541;
            --bg-secondary: #1a3a5a;
            --text: #73CAFF;
            --text-secondary: #73CAFF;
            --border: #2a4a6a;
            --success: #10b981;
            --warning: #f59e0b;
        }


        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            border-bottom: 2px solid #73CAFF;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #73CAFF;
            text-shadow: 4px 4px 10px rgba(0, 0, 0, 1);
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .timestamp {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }


        .card {
            background-color: #0d2541;
            border: 1px solid #050f1a45;
            border-radius: 14px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 14px 14px 20px #050f1a, -14px -14px 20px #153b6866;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #73CAFF;
            border-bottom: 2px solid #73CAFF;
            padding-bottom: 0.5rem;
            text-shadow: 4px 4px 10px rgba(0, 0, 0, 1);
        }

        .field-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1rem;
        }

        .field {
            display: flex;
            flex-direction: column;
        }

        .field-label {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
            letter-spacing: 0.5px;
            text-shadow: 4px 4px 10px rgba(0, 0, 0, 1);
        }

        .field-value {
            font-size: 1rem;
            color: var(--text);
            word-break: break-word;
            text-shadow: 4px 4px 10px rgba(0, 0, 0, 1);
        }

        .field-value.highlight {
            font-weight: 600;
            color: #73CAFF;
            font-size: 1.1rem;
        }

        .management-item {
            background-color: var(--bg);
            border-left: 3px solid #73CAFF;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 0.375rem;
        }

        .error {
            background-color: #fee2e2;
            border: 1px solid #fca5a5;
            color: #991b1b;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
        }


        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-align: center;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            .header-info {
                flex-direction: column;
                align-items: flex-start;
            }

            .field-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-info">
                <div>
                    <h1>🏢 Handelsregisterauszug</h1>
                </div>
            </div>
        </header>

        <div id="content"></div>

        <footer>
            <p>Quelle: Amtsgericht Rostock | <span id="footerTime">-</span></p>
        </footer>
    </div>

    <script>
        const GITHUB_URL = 'https://raw.githubusercontent.com/wbgrds/de.webguards.root/main/handelsregister/MV-Rostock_HRB_15292%2BSI-20260714135316.xml';
        const REFRESH_INTERVAL = 5 * 60 * 1000; // 5 Minuten

        async function loadData() {
            const contentDiv = document.getElementById('content');

            try {
                const response = await fetch(GITHUB_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const xmlText = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, 'text/xml');

                if (xmlDoc.getElementsByTagName('parsererror').length > 0) {
                    throw new Error('XML Parsing Fehler');
                }

                const data = parseXML(xmlDoc);
                contentDiv.innerHTML = renderHTML(data);

                const now = new Date();
                const dateStr = `${now.getDate()}.${now.getMonth() + 1}.${now.getFullYear()}, ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
                document.getElementById('footerTime').textContent = dateStr;

            } catch (error) {
                contentDiv.innerHTML = `
                    <div class="error">
                        <strong>Fehler beim Laden:</strong> ${error.message}
                    </div>
                `;
            }
        }

        function parseXML(xmlDoc) {
            const data = {};

            // Grundinformationen
            const allFields = xmlDoc.querySelectorAll('feldgruppe > feld');
            allFields.forEach(field => {
                const name = field.getAttribute('name');
                const value = field.getAttribute('wert');
                if (name && value) data[name] = value;
            });

            // Geschäftsführer
            data.directors = [];
            xmlDoc.querySelectorAll('feldgruppe[name="massnahmepartner"] feld[name="partner_name"]').forEach((elem, idx) => {
                data.directors.push({
                    name: elem.getAttribute('wert'),
                    birthDate: xmlDoc.querySelectorAll('feldgruppe[name="massnahmepartner"] feld[name="partner_geburtsdatum"]')[idx]?.getAttribute('wert') || 'N/A'
                });
            });

            return data;
        }

        function renderHTML(data) {
            let html = '';

            // Registerdaten
            html += `
                <div class="card">
                    <div class="card-title">📋 Registerdaten</div>
                    <div class="field-group">
                        <div class="field">
                            <div class="field-label">Registerart</div>
                            <div class="field-value highlight">${data['register_art_bezeichnung'] || 'HRB'}</div>
                        </div>
                        <div class="field">
                            <div class="field-label">Registernummer</div>
                            <div class="field-value highlight">${data['register_nummer'] || '15292'}</div>
                        </div>
                        <div class="field">
                            <div class="field-label">Datum des Auszugs</div>
                            <div class="field-value">${data['auszugsdatum'] || formatDate(new Date())}</div>
                        </div>
                        <div class="field">
                            <div class="field-label">Gericht</div>
                            <div class="field-value">${data['gericht_name'] || 'Amtsgericht Rostock'}</div>
                        </div>
                    </div>
                </div>
            `;

            // Unternehmensinformationen
            html += `
                <div class="card">
                    <div class="card-title">🏪 Unternehmen</div>
                    <div class="field-group">
                        <div class="field">
                            <div class="field-label">Firma</div>
                            <div class="field-value highlight">${data['firma'] || 'WEBGUARDS UG (haftungsbeschränkt)'}</div>
                        </div>
                        <div class="field">
                            <div class="field-label">Rechtsform</div>
                            <div class="field-value">${data['rechtsform'] || 'GmbH'}</div>
                        </div>
                        <div class="field">
                            <div class="field-label">Sitz</div>
                            <div class="field-value">${data['sitz'] || 'Rostock'}</div>
                        </div>
                        <div class="field">
                            <div class="field-label">Adresse</div>
                            <div class="field-value">${data['strasse'] || 'Marieneher Straße 5'}, ${data['plz'] || '18069'} ${data['ort'] || 'Rostock'}</div>
                        </div>
                    </div>
                    <div class="field">
                        <div class="field-label">Geschäftsgegenstand</div>
                        <div class="field-value">${data['geschaeftsgegenstand'] || 'Dienstleistungen im digitalen Bereich (Webdesign, IT-Service, Webentwicklung, Server-Administration, Consulting)'}</div>
                    </div>
                </div>
            `;

            // Kapital
            if (data['kapital'] || data['kapital_betrag']) {
                html += `
                    <div class="card">
                        <div class="card-title">💰 Kapital</div>
                        <div class="field">
                            <div class="field-label">Stammkapital</div>
                            <div class="field-value highlight">${data['kapital_betrag'] || '500,00'} EUR</div>
                        </div>
                    </div>
                `;
            }

            // Geschäftsführer
            html += `
                <div class="card">
                    <div class="card-title">👤 Geschäftsführung</div>
            `;

            if (data.directors && data.directors.length > 0) {
                data.directors.forEach(director => {
                    html += `
                        <div class="management-item">
                            <div class="field">
                                <div class="field-label">Name</div>
                                <div class="field-value">${director.name}</div>
                            </div>
                            <div class="field">
                                <div class="field-label">Geburtsdatum</div>
                                <div class="field-value">${director.birthDate}</div>
                            </div>
                        </div>
                    `;
                });
            } else {
                html += `
                    <div class="management-item">
                        <div class="field-label">Geschäftsführer</div>
                        <div class="field-value">Olaf Bielicke (geb. 05.09.1970)</div>
                    </div>
                `;
            }

            html += `</div>`;

            // Repräsentation
            html += `
                <div class="card">
                    <div class="card-title">⚖️ Repräsentation</div>
                    <div class="field">
                        <div class="field-label">Vertretungsregelung</div>
                        <div class="field-value">Der einzelne Geschäftsführer vertritt die Gesellschaft allein. Mehrere Geschäftsführer vertreten die Gesellschaft gemeinschaftlich.</div>
                    </div>
                </div>
            `;

            return html;
        }

        function formatDate(date) {
            return new Intl.DateTimeFormat('de-DE', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            }).format(date);
        }

        // Beim Laden der Seite Daten abrufen
        window.addEventListener('load', () => {
            loadData();
            // Auto-Refresh alle 5 Minuten
            setInterval(loadData, REFRESH_INTERVAL);
        });

        // Fehlerbehandlung für Cross-Origin
        if (!navigator.userAgentData?.mobile) {
            // Bei Desktop eventuell CORS-Proxy verwenden falls nötig
        }
    </script>
</body>
</html>
